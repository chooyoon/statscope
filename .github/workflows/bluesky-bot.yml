name: StatScope Bluesky Bot

on:
  schedule:
    # All times UTC (ET = UTC-4 during EDT)
    # 9 AM ET = 13:00 UTC → Morning recaps + results check
    - cron: '0 13 * * *'
    # 12 PM ET = 16:00 UTC → Daily prediction picks
    - cron: '0 16 * * *'
    # 1 PM ET = 17:00 UTC → Afternoon previews
    - cron: '0 17 * * *'
    # 8 PM ET = 00:00 UTC → Evening recaps
    - cron: '0 0 * * *'
    # 11 AM ET = 15:00 UTC → Interact (follow-back + replies)
    - cron: '0 15 * * *'
  workflow_dispatch:
    inputs:
      command:
        description: 'Bot command (auto/recap/preview/leaders/interact/picks/check-results)'
        required: false
        default: 'auto'

# Required so the bot can commit the updated picks-history.json back to main.
permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    # Don't run the post job on interact schedule
    if: github.event.schedule != '0 15 * * *' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r x-bot/requirements.txt

      # Restore post history from cache to prevent duplicate posts
      - name: Restore post history
        uses: actions/cache@v4
        with:
          path: x-bot/.post_history.json
          key: bot-history-${{ github.run_id }}
          restore-keys: bot-history-

      - name: Determine command
        id: cmd
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "command=${{ github.event.inputs.command || 'auto' }}" >> $GITHUB_OUTPUT
          else
            HOUR=$(TZ="America/New_York" date +%H)
            echo "Current ET hour: $HOUR"
            if [ "$HOUR" -ge 8 ] && [ "$HOUR" -lt 12 ]; then
              echo "command=recap" >> $GITHUB_OUTPUT
            elif [ "$HOUR" -ge 12 ] && [ "$HOUR" -lt 13 ]; then
              echo "command=picks" >> $GITHUB_OUTPUT
            elif [ "$HOUR" -ge 13 ] && [ "$HOUR" -lt 19 ]; then
              echo "command=preview" >> $GITHUB_OUTPUT
            else
              echo "command=recap" >> $GITHUB_OUTPUT
            fi
          fi

      # In the morning recap slot (~9 AM ET), resolve yesterday's pick
      # results first so the /track page reflects them before today's posts
      # go out. This never talks to Bluesky, so it's cheap to run.
      - name: Check yesterday's pick results
        if: steps.cmd.outputs.command == 'recap'
        env:
          STATSCOPE_URL: https://statscope-eta.vercel.app
        working-directory: x-bot
        run: python x_bot.py check-results

      - name: Run bot
        env:
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_PASSWORD: ${{ secrets.BLUESKY_PASSWORD }}
          STATSCOPE_URL: https://statscope-eta.vercel.app
        working-directory: x-bot
        run: python x_bot.py ${{ steps.cmd.outputs.command }}

      # Commit updated picks-history.json back to main so /track sees the
      # new record on the next Vercel deploy. No-op if nothing changed.
      - name: Commit picks-history updates
        run: |
          git config user.name "statscope-bot"
          git config user.email "bot@statscope.local"
          if [ -n "$(git status --porcelain public/data/picks-history.json)" ]; then
            git add public/data/picks-history.json
            git commit -m "chore(bot): update picks-history [skip ci]"
            git push
            echo "picks-history.json pushed."
          else
            echo "No picks-history changes to commit."
          fi

  interact:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 15 * * *' || (github.event_name == 'workflow_dispatch' && github.event.inputs.command == 'interact')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r x-bot/requirements.txt

      - name: Run interact
        env:
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_PASSWORD: ${{ secrets.BLUESKY_PASSWORD }}
          STATSCOPE_URL: https://statscope-eta.vercel.app
        working-directory: x-bot
        run: python x_bot.py interact
