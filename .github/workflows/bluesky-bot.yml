name: StatScope Bluesky Bot

on:
  schedule:
    # All times in UTC (ET = UTC-4 during EDT)
    # 9 AM ET = 13:00 UTC → Morning recaps (only recap of the day)
    - cron: '0 13 * * *'
    # 1 PM ET = 17:00 UTC → Afternoon previews
    - cron: '0 17 * * *'
    # 5 PM ET = 21:00 UTC → Evening leaders
    - cron: '0 21 * * *'
    # 11 AM ET = 15:00 UTC → Interact (follow-back + replies)
    - cron: '0 15 * * *'
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests atproto python-dotenv

      - name: Determine command
        id: cmd
        run: |
          HOUR=$(TZ="America/New_York" date +%H)
          echo "hour=$HOUR"
          if [ "$HOUR" -ge 9 ] && [ "$HOUR" -lt 13 ]; then
            echo "command=recap" >> $GITHUB_OUTPUT
          elif [ "$HOUR" -ge 13 ] && [ "$HOUR" -lt 17 ]; then
            echo "command=preview" >> $GITHUB_OUTPUT
          elif [ "$HOUR" -ge 17 ] && [ "$HOUR" -lt 22 ]; then
            echo "command=leaders" >> $GITHUB_OUTPUT
          else
            echo "command=preview" >> $GITHUB_OUTPUT
          fi

      - name: Run bot
        env:
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_PASSWORD: ${{ secrets.BLUESKY_PASSWORD }}
          STATSCOPE_URL: https://statscope-eta.vercel.app
        working-directory: x-bot
        run: |
          python x_bot.py ${{ steps.cmd.outputs.command }}
          if [ -n "${{ steps.cmd.outputs.extra }}" ]; then
            python x_bot.py ${{ steps.cmd.outputs.extra }}
          fi

  interact:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 15 * * *' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests atproto python-dotenv

      - name: Run interact
        env:
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_PASSWORD: ${{ secrets.BLUESKY_PASSWORD }}
          STATSCOPE_URL: https://statscope-eta.vercel.app
        working-directory: x-bot
        run: python x_bot.py interact
